<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NutriPlan">
  <meta name="theme-color" content="#0a0a0a">
  <title>NutriPlan | Gold Cinematic Edition</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Montserrat:wght@400;500;700;800;900&family=Orbitron:wght@600;800;900&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: radial-gradient(circle at center, #150a0a 0%, #060606 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: #ffffff;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-thumb {
      background: #d63031;
      border-radius: 4px
    }

    .hdr {
      padding: 18px 18px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .hdr-l {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .hdr-l .ic {
      width: 40px;
      height: 40px;
      background: #141414;
      color: #d63031;
      border: 1px solid #d63031;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 12px rgba(214, 48, 49, 0.3);
    }

    .hdr-l h1 {
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 1px
    }

    .hdr-l h1 b {
      color: #d63031
    }

    .hdr-l .sub {
      font-size: 11px;
      color: #8f9ca5;
      letter-spacing: 2px;
      text-transform: uppercase
    }

    .hdr-a {
      display: flex;
      gap: 6px
    }

    .bt {
      border: none;
      cursor: pointer;
      border-radius: 8px;
      font-family: 'Cairo';
      font-size: 13px;
      font-weight: 700;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s
    }

    .bt-r {
      background: #141414;
      color: #ffffff;
      border: 1px solid #2f2f2f;
    }

    .bt-r:hover {
      box-shadow: 0 0 12px rgba(214, 48, 49, 0.25);
      border-color: #d63031;
      background: rgba(214, 48, 49, 0.1);
    }

    .bt-g {
      background: linear-gradient(135deg, #ff4747 0%, #b21f1f 100%);
      color: #ffffff;
      box-shadow: 0 0 12px rgba(214, 48, 49, 0.4)
    }

    .bt-g:hover {
      box-shadow: 0 0 18px rgba(214, 48, 49, 0.6);
      filter: brightness(1.05);
    }

    .bt-g:active {
      transform: scale(0.96)
    }

    .bt-g.ld {
      opacity: 0.6;
      pointer-events: none
    }

    .tbar {
      padding: 0 14px;
      margin-bottom: 14px
    }

    .tbar-in {
      display: flex;
      gap: 3px;
      padding: 3px;
      border-radius: 12px;
      background: #111111;
      border: 1px solid rgba(214, 48, 49, 0.2)
    }

    .tb {
      flex: 1;
      border: none;
      cursor: pointer;
      background: transparent;
      color: #a5b1c2;
      padding: 8px 2px 6px;
      border-radius: 8px;
      font-family: 'Cairo';
      font-size: 12px;
      font-weight: 700;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: all 0.2s
    }

    .tb .ti {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #d63031;
    }

    .tb.a {
      background: #1c1111;
      color: #ffffff;
      border-top: 3px solid #d63031;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 4px 12px rgba(214, 48, 49, 0.25);
    }

    .tb.a .ti {
      color: #ffffff
    }

    .ca {
      padding: 0 14px 80px
    }

    .cc {
      background: #111111;
      border: 1px solid #1c1c1c;
      border-top: 4px solid #d63031;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
      border-radius: 12px;
      padding: 20px 16px;
      min-height: 50vh
    }

    .st {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1c1c1c
    }

    .st h2 {
      font-size: 17px;
      font-weight: 700;
      color: #ffffff
    }

    .st .si {
      color: #d63031;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fd {
      margin-top: 12px;
      margin-bottom: 12px
    }

    .fd label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 6px
    }

    .fd input,
    .fd select,
    .fd textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #2b2b2b;
      border-radius: 6px;
      background: #161616;
      font-family: 'Cairo';
      font-size: 15px;
      color: #ffffff;
      outline: none;
      direction: rtl;
      transition: all 0.3s
    }

    .fd input::placeholder {
      color: #666666;
    }

    .fd input[type="date"],
    .fd input[type="number"] {
      direction: ltr;
      text-align: right
    }

    .fd input:focus,
    .fd textarea:focus,
    .fd select:focus {
      border-color: #d63031;
      box-shadow: 0 0 10px rgba(214, 48, 49, 0.25)
    }

    .fd textarea {
      resize: none;
      line-height: 1.8
    }

    .fd select option {
      background: #111111
    }

    .g2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .g4 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 8px
    }

    .cs2 {
      grid-column: span 2
    }

    .macro-row {
      display: flex;
      gap: 5px;
      margin-top: 8px;
      direction: ltr
    }

    .mp {
      flex: 1;
      padding: 8px 4px;
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      border: 1px solid;
      text-transform: none
    }

    .mp .mv {
      font-size: 16px;
      font-weight: 800;
      display: block;
      margin-bottom: 2px
    }

    .mp-c {
      background: rgba(214, 48, 49, 0.08);
      border-color: #d63031;
      color: #d63031
    }

    .mp-p {
      background: rgba(255, 255, 255, 0.08);
      border-color: #ffffff;
      color: #ffffff
    }

    .mp-k {
      background: rgba(180, 180, 180, 0.08);
      border-color: #b4b4b4;
      color: #ffffff
    }

    .mp-f {
      background: rgba(214, 48, 49, 0.08);
      border-color: #d63031;
      color: #ffffff
    }

    .dt {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      background: #151515;
      border: 1px solid #222222;
      display: flex;
      justify-content: space-around;
      text-align: center;
      direction: ltr
    }

    .dt .di {
      font-size: 13px;
      font-weight: 800;
      color: #a5b1c2;
      text-transform: none
    }

    .di .dv {
      font-size: 18px;
      font-weight: 800;
      display: block;
      margin-bottom: 2px
    }

    .di-c .dv {
      color: #d63031
    }

    .di-p .dv {
      color: #ffffff
    }

    .di-k .dv {
      color: #a5b1c2
    }

    .di-f .dv {
      color: #ffffff
    }

    .mc {
      padding: 14px;
      margin-bottom: 12px;
      background: #151515;
      border: 1px solid #222222;
      border-radius: 8px;
      position: relative
    }

    .mc-rm {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid #ff4d4d;
      cursor: pointer;
      background: transparent;
      color: #ff4d4d;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .mc-n {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 24px;
      height: 24px;
      background: #d63031;
      color: #ffffff;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800
    }

    .ba {
      width: 100%;
      padding: 14px;
      border: 1px dashed rgba(214, 48, 49, 0.4);
      border-radius: 8px;
      background: transparent;
      color: #d63031;
      font-family: 'Cairo';
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s
    }

    .ba:hover {
      border-color: #d63031;
      background: rgba(214, 48, 49, 0.05);
      box-shadow: 0 0 12px rgba(214, 48, 49, 0.15)
    }

    .rs {
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 12px;
      background: #151515;
      border: 1px solid #222222
    }

    .phu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px
    }

    .phc {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid #d63031;
      overflow: hidden;
      background: #151515;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      box-shadow: 0 0 15px rgba(214, 48, 49, 0.3)
    }

    .phc img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .phc .php {
      font-size: 28px
    }

    .phc input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer
    }

    .phl {
      font-size: 13px;
      color: #d63031;
      font-weight: 600
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #111111;
      color: #ffffff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      border: 1px solid #d63031;
      box-shadow: 0 0 15px rgba(214, 48, 49, 0.4);
      z-index: 1000;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)
    }

    .toast.show {
      transform: translateX(-50%) translateY(0)
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .sp {
      width: 12px;
      height: 12px;
      border: 2px solid #0c1015;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block
    }

    .tc {
      animation: fu 0.25s ease
    }

    @keyframes fu {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @media(min-width:768px) {
      .cc {
        padding: 28px
      }

      .g2 {
        gap: 16px
      }

      .hdr {
        padding: 22px 24px 14px
      }

      .tbar {
        padding: 0 22px
      }

      .ca {
        padding: 0 22px 80px
      }
    }

    /* PDF Rendering Styles with Red/White Theme */
    #pdf-render {
      position: absolute;
      left: -9999px;
      top: 0;
      width: 794px
    }

    .pp {
      width: 794px;
      height: 1123px;
      position: relative;
      overflow: hidden;
      font-family: 'Cairo', sans-serif;
      direction: rtl;
      background: #0d1219;
      color: #ffffff
    }

    .pp-bg {
      position: absolute;
      inset: 0;
      background: #0d1219
    }

    .pp-pat {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: linear-gradient(#d63031 1px, transparent 1px), linear-gradient(90deg, #d63031 1px, transparent 1px);
      background-size: 40px 40px
    }

    .pp-bdr {
      position: absolute;
      inset: 20px;
      border: 1px solid rgba(214, 48, 49, 0.2);
      border-radius: 4px;
      pointer-events: none;
      z-index: 2;
    }

    .pp-ct {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 50px 60px;
      box-sizing: border-box
    }

    .pp-ft {
      margin-top: auto;
      padding: 12px 0;
      text-align: center;
      font-size: 12px;
      color: #8fa0b5;
      width: 100%;
      border-top: 1px solid rgba(214, 48, 49, 0.2)
    }

    /* Premium Fitness PDF Styles */
    .pp-bg-steak {
      position: absolute;
      inset: 0;
      background: url('images/meals_bg.jpg') center center/cover no-repeat;
      opacity: 0.22;
      filter: grayscale(10%) contrast(110%);
    }

    .pp-gradient-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(13, 18, 25, 0.4) 0%, rgba(13, 18, 25, 0.8) 75%, #0d1219 100%);
      z-index: 1;
    }

    /* Red/White Theme adjustments for cover and other pages */
    .pp-red-badge {
      background: #d63031;
      color: #ffffff;
      padding: 8px 24px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 4px;
      margin-bottom: 12px;
      z-index: 2;
      position: relative;
      box-shadow: 0 0 15px rgba(214, 48, 49, 0.4);
      border: 1px solid #d63031;
    }

    .pp-cname-red {
      font-size: 36px;
      font-weight: 900;
      color: #ffffff;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
      line-height: 1.2;
    }

    .pp-ccard {
      background: rgba(20, 29, 39, 0.5);
      border: 1px solid rgba(214, 48, 49, 0.3);
      border-radius: 8px;
      padding: 24px 30px;
      width: 85%;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.8);
      position: relative;
      z-index: 3;
    }

    .pp-ctitle {
      text-align: center;
      color: #d63031;
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .pp-cgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 30px;
    }

    .pp-citem {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .pp-cil {
      font-size: 13px;
      color: #d63031;
      font-weight: 800;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .pp-civ {
      font-size: 20px;
      color: #ffffff;
      font-weight: 800;
      font-family: 'Cairo';
    }

    .pp-mbar-red {
      display: flex;
      gap: 16px;
      width: 85%;
      direction: ltr;
      z-index: 3;
    }

    .pp-mb-red {
      flex: 1;
      padding: 14px 6px;
      border-radius: 4px;
      text-align: center;
      border: 1px solid rgba(214, 48, 49, 0.35);
      background: rgba(13, 18, 25, 0.5);
      box-shadow: 0 0 15px rgba(214, 48, 49, 0.1);
    }

    .pp-mb-red .pv2 {
      font-size: 24px;
      font-weight: 900;
      display: block;
      margin-bottom: 4px;
      font-family: 'Montserrat', sans-serif;
      color: #ffffff;
    }

    .pp-mb-red .pl2 {
      font-size: 11px;
      font-weight: 800;
      color: #d63031;
      text-transform: uppercase;
    }

    /* Inner page headers in Red/White theme */
    .pp-ph-red h2 {
      font-size: 30px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .pp-ph-red .phs {
      font-size: 12px;
      color: #d63031;
      letter-spacing: 6px;
      margin-top: 6px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .pp-ph-red .phl2 {
      width: 60px;
      height: 3px;
      background: #d63031;
      margin: 12px auto 0;
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(214, 48, 49, 0.6);
    }

    /* Meal page specific layouts */
    .pp-ct-meal {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 40px 45px 40px;
      box-sizing: border-box;
    }

    .meal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 25px;
    }

    .meal-header-left {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 2px;
    }

    .meal-header-center {
      display: flex;
      align-items: center;
    }

    .meal-header-right {
      display: flex;
      align-items: center;
      color: #ffffff;
    }

    .meal-title-box {
      width: 100%;
      border: 1px solid rgba(214, 48, 49, 0.35);
      background: rgba(13, 18, 25, 0.5);
      padding: 12px 20px;
      margin-bottom: 30px;
      position: relative;
      text-align: center;
    }

    .meal-title-box::before {
      content: '';
      position: absolute;
      top: -4px;
      left: -4px;
      width: 12px;
      height: 12px;
      border-top: 2.5px solid #d63031;
      border-left: 2.5px solid #d63031;
    }

    .meal-title-box::after {
      content: '';
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 12px;
      height: 12px;
      border-bottom: 2.5px solid #d63031;
      border-right: 2.5px solid #d63031;
    }

    .meal-title-en {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #d63031;
      letter-spacing: 3px;
      margin-bottom: 4px;
    }

    .meal-title-ar {
      font-family: 'Cairo', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: #ffffff;
    }

    .meal-options-container {
      display: flex;
      flex-direction: column;
      gap: 25px;
      flex-grow: 1;
      justify-content: center;
      width: 100%;
    }

    .meal-option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      position: relative;
    }

    .meal-option-box {
      width: 70%;
      border: 1px solid rgba(214, 48, 49, 0.35);
      background: rgba(13, 18, 25, 0.5);
      padding: 16px 20px;
      position: relative;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-sizing: border-box;
    }

    .meal-option-box::before {
      content: '';
      position: absolute;
      top: -4px;
      left: -4px;
      width: 12px;
      height: 12px;
      border-top: 2.5px solid #d63031;
      border-left: 2.5px solid #d63031;
    }

    .meal-option-box::after {
      content: '';
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 12px;
      height: 12px;
      border-bottom: 2.5px solid #d63031;
      border-right: 2.5px solid #d63031;
    }

    .meal-line-en {
      font-family: 'Montserrat', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      margin-bottom: 6px;
      line-height: 1.4;
      direction: ltr;
    }

    .meal-line-ar {
      font-family: 'Cairo', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #ffffff;
      text-align: center;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .meal-line-note {
      font-family: 'Montserrat', 'Cairo', sans-serif;
      font-size: 14px;
      font-weight: 700;
      font-style: italic;
      color: #d63031;
      text-align: center;
      margin-top: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .meal-or-separator {
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      font-weight: 900;
      color: #ffffff;
      text-align: right;
      padding-right: 32%;
      letter-spacing: 2px;
      margin: 5px 0;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    .meal-image-container {
      width: 25%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .dot-pattern {
      position: absolute;
      width: 80px;
      height: 120px;
      background-image: radial-gradient(rgba(255, 255, 255, 0.25) 1.5px, transparent 1.5px);
      background-size: 8px 8px;
      z-index: 1;
      right: -10px;
      bottom: -20px;
    }
